<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M68000 Skipanalisti</title>
  <style>
    :root{
      --bg:#f9f9f9;--card:#fff;--muted:#eee;--text:#333;--brand:#0055aa;--shadow:0 2px 5px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:24px}
    h1{margin:0 0 16px;text-align:center}
    .flags{display:flex;justify-content:center;gap:12px;margin-bottom:12px}
    .flags img{width:36px;height:24px;cursor:pointer;border:2px solid transparent;border-radius:4px}
    .flags img.active{border-color:var(--brand)}
    .search-box{max-width:520px;margin:0 auto 20px;text-align:center}
    input[type="text"]{width:100%;padding:12px 14px;border:1px solid #ccd;border-radius:10px;font-size:16px}
    .category{background:var(--muted);padding:12px 14px;margin:12px 0;border-radius:10px;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:8px}
    .category::after{content:'▸';margin-left:auto;transition:transform .2s ease}
    .category.open::after{transform:rotate(90deg)}
    .commands{display:none;padding:10px 0 0 18px}
    .command{background:var(--card);padding:10px 12px;margin:8px 0;border-radius:10px;box-shadow:var(--shadow)}
    .cmd-name{font-weight:700;color:var(--brand)}

    .diagram-wrap{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px}
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 0}
    .tag{border:1px solid #ccd;background:#fafafa;border-radius:999px;padding:6px 10px;font-size:12px;cursor:pointer}
    .tag.active{border-color:var(--brand);outline:2px solid rgba(0,85,170,.15)}
    svg{width:100%;height:auto;max-height:560px}
    .node{fill:#ffffff;stroke:#bfc8d6;stroke-width:1.2}
    .node-title{font-weight:700;fill:#222}
    .subtext{fill:#444;font-size:11px}
    .arrow{stroke:#9aa7bd;stroke-width:2;fill:none;marker-end:url(#arrowHead);opacity:.45}
    .arrow.active{stroke:var(--brand);opacity:1}
    .dashed{stroke-dasharray:6 6}
  </style>
</head>
<body>
  <h1>M68000 Skipanalisti</h1>
  <div class="flags">
    <img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/Flag_of_Iceland.svg" alt="Icelandic" data-lang="is" class="active">
    <img src="https://upload.wikimedia.org/wikipedia/en/a/ae/Flag_of_the_United_Kingdom.svg" alt="English" data-lang="en">
  </div>

  <div class="search-box">
    <input type="text" id="search" placeholder="Leita að skipun eða heimilisástandi...">
  </div>

  <!-- Gagnahreyfing -->
  <div class="category">Gagnahreyfing</div>
  <div class="commands">
    <div class="command"><span class="cmd-name">MOVE</span> – Afrita gögn frá uppsprettu til áfangastaðar.</div>
    <div class="command"><span class="cmd-name">MOVEA</span> – Færa gögn í heimilisnúmerskrá.</div>
  </div>

  <!-- Heimilisstillingar Mynd -->
  <div class="category open">Heimilisstillingar Mynd (virk)</div>
  <div class="commands" style="display:block">
    <div class="diagram-wrap">
      <svg viewBox="0 0 900 520" role="img" aria-label="M68000 heimilisstillingar mynd">
        <defs>
          <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z"></path>
          </marker>
        </defs>

        <rect class="node" x="40" y="40" width="230" height="180" rx="12"/>
        <text x="55" y="65" class="node-title">CPU Skrár</text>
        <text x="55" y="90" class="subtext">D0–D7 (Gagn)</text>
        <text x="55" y="110" class="subtext">A0–A7 (Heimilisfang)</text>
        <text x="55" y="130" class="subtext">SP=A7</text>
        <text x="55" y="150" class="subtext">CCR/SR</text>

        <rect class="node" x="560" y="40" width="300" height="420" rx="12"/>
        <text x="575" y="65" class="node-title">Minni</text>
        <rect class="node" x="580" y="90" width="260" height="60" rx="8"/>
        <text x="590" y="115" class="subtext">Absolute Stutt ($0000–$7FFF)</text>
      </svg>
    </div>
  </div>

  <script>
    // Language toggle
    const flags = document.querySelectorAll('.flags img');
    flags.forEach(f => {
      f.addEventListener('click', ()=>{
        flags.forEach(ff=>ff.classList.remove('active'));
        f.classList.add('active');
        const lang = f.dataset.lang;

        document.querySelectorAll('[data-en]').forEach(el=>{
          if(el.dataset[lang]) el.textContent = el.dataset[lang];
        });
        document.querySelectorAll('input[placeholder]').forEach(inp=>{
          if(inp.dataset[lang]) inp.placeholder = inp.dataset[lang];
        });
      });
    });
  </script>
</body>
</html>
